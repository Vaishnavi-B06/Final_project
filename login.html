<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — SmartGlam</title>
  <link rel="stylesheet" href="css/style.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    .auth-layout {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1fr;
      background: var(--pearl);
    }

    .auth-visual {
      position: relative;
      overflow: hidden;
      background: linear-gradient(160deg, #F5E0E2, #EDD4E0, #E8D8F0);
    }

    .auth-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.6;
      mix-blend-mode: multiply;
    }

    .auth-visual-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 3rem;
      background: linear-gradient(to top, rgba(139, 74, 82, 0.7) 0%, transparent 60%);
    }

    .auth-visual-overlay h2 {
      font-family: var(--font-display);
      font-size: 2.4rem;
      color: #fff;
      line-height: 1.2;
      margin-bottom: 0.6rem;
    }

    .auth-visual-overlay p {
      color: rgba(255, 255, 255, 0.75);
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .auth-visual-logo {
      position: absolute;
      top: 2rem;
      left: 2rem;
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    .auth-form-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.5rem;
      position: relative;
    }

    .auth-form-box {
      width: 100%;
      max-width: 400px;
    }

    .auth-form-box h2 {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 0.4rem;
    }

    .auth-subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--glass-border);
    }

    /* Social Buttons */
    .social-btn {
      background: transparent; 
      border: 1px solid var(--glass-border); 
      color: var(--ink); 
      justify-content: center; 
      font-size: 0.9rem; 
      font-weight: 600;
      transition: var(--t-fast);
    }
    
    .social-btn:hover {
      background: var(--pearl);
      border-color: var(--rose);
    }

    @media (max-width: 800px) {
      .auth-layout {
        grid-template-columns: 1fr;
      }

      .auth-visual {
        display: none;
      }
    }
  </style>
</head>

<body>
  <div class="orb-bg orb-1" style="opacity:0.2;"></div>
  <div class="orb-bg orb-2" style="opacity:0.15;"></div>

  <div class="auth-layout">
    <!-- LEFT VISUAL -->
    <div class="auth-visual">
      <img
        src="https://images.unsplash.com/photo-1487412947147-5cebf100ffc2?ixlib=rb-4.0.3&auto=format&fit=crop&w=900&q=80"
        alt="Beauty">
      <div class="auth-visual-overlay">
        <h2>Your Perfect Look<br>Starts Here</h2>
        <p>AI-powered beauty analysis tailored just for you.</p>
      </div>
      <div class="auth-visual-logo">✦ SmartGlam</div>
    </div>

    <!-- RIGHT FORM -->
    <div class="auth-form-area">
      <div class="auth-form-box">
        <a href="index.html"
          style="font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:0.4rem;margin-bottom:2.5rem;text-decoration:none;">
          ← Back to Home
        </a>
        <h2>Welcome Back ✨</h2>
        <p class="auth-subtitle">Login to continue your beauty journey.</p>

        <div id="login-form-wrap">
          <form id="login-form">
            <div class="input-group">
              <label>Email Address</label>
              <input type="email" id="login-email" required placeholder="you@example.com">
            </div>
            
            <div class="input-group" style="position: relative;">
              <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 0.4rem;">
                <label style="margin-bottom: 0;">Password</label>
                <a href="#" style="font-size: 0.75rem; color: var(--rose-dark); text-decoration: none; font-weight: 600;">Forgot Password?</a>
              </div>
              <div style="position: relative;">
                <input type="password" id="login-password" required placeholder="Your password" style="padding-right: 40px; width: 100%;">
                <span id="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--muted);">
                  <i class="fa-regular fa-eye"></i>
                </span>
              </div>
            </div>

            <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--ink);">
              <input type="checkbox" id="remember-me" style="width: auto; margin: 0; cursor: pointer;">
              <label for="remember-me" style="margin: 0; font-weight: 500; cursor: pointer;">Remember me</label>
            </div>

            <button type="submit" class="btn btn-primary w-100" style="justify-content:center;margin-top:0.4rem;">
              Login to SmartGlam
            </button>
          </form>

          <div class="divider">or continue with</div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;">
            <button type="button" class="btn social-btn">
              <i class="fa-brands fa-google" style="color: #DB4437;"></i> Google
            </button>
            <button type="button" class="btn social-btn">
              <i class="fa-brands fa-facebook" style="color: #4267B2;"></i> Facebook
            </button>
          </div>

          <p style="text-align:center;font-size:0.88rem;color:var(--muted);">
            Don't have an account? <a href="signup.html" style="color:var(--rose-dark);font-weight:600;">Sign up
              free</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>
  <div id="loader" class="hidden">
    <div class="spinner"></div>
    <p>Logging in...</p>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <script src="https://unpkg.com/appwrite@14.0.1"></script>
  <script src="js/firebase.js"></script>
  <script src="js/appwrite.js"></script>
  <script src="js/script.js"></script>
  <script>
    const togglePassword = document.getElementById('toggle-password');
    const passwordInput = document.getElementById('login-password');

    if (togglePassword && passwordInput) {
      togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.innerHTML = type === 'password' ? '<i class="fa-regular fa-eye"></i>' : '<i class="fa-regular fa-eye-slash"></i>';
      });
    }
  </script>
</body>

</html>
